# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
# 欢迎使用 Jekyll！
# 此配置文件用于设置影响整个博客的全局选项，这些值你只需设置一次，之后很少需要编辑。
# 如果你发现自己需要频繁编辑此文件，可以考虑使用 Jekyll 的数据文件功能来存放需要经常更新的数据。
# 由于技术原因，当你使用 'bundle exec jekyll serve' 时，此文件 不会 自动重新加载。
# 如果你修改了此文件，请重启服务器进程。
# 网站设置
# 这些设置用于个性化你的新站点。如果你查看 HTML 文件，会看到它们通过 {{ site.title }}、{{ site.email }} 等方式被调用。
# 你可以创建任何自定义变量，然后在模板中通过 {{ site.myvariable }} 访问它们。
title: 04WMaysak的小窝
email:
description: >- # this means to ignore newlines until "baseurl:"这些设置用于个性化你的新站点。如果你查看 HTML 文件，  会看到它们通过 {{ site.title }}、{{ site.email }}等方式被调用。你可以创建任何自定义变量，然后在模板中通过 {{ site.myvariable }} 访问它们。
  用来记笔记和传一些感兴趣的东西的个人主页。
  正在努力进步的零基础技术新手。
  PKU EECS 25
twitter_username: None__
github_username: Maysak
minimal_mistakes_skin: default
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: Asia/Shanghai# https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.以下项目默认不会被处理。你可以创建自定义列表来覆盖默认设置。”
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "Maysak"
  avatar : "/assets/images/bio-photo.jpg"
  bio    : "WP042015"
  links:
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "https://"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://instagram.com/"

footer:
  links:
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://instagram.com/"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
